<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maurice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .btn-primary {
      background: #6366f1;
      color: #fff;
    }

    .btn-secondary {
      border: 1px solid #333;
      color: #ccc;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">👋</div>
    <h1>Hey, ich bin Maurice.</h1>
    <p class="tagline">Ich lerne gerade Webentwicklung & GitHub.</p>
    <div class="links">
      <a class="btn btn-primary" href="https://github.com/svmbgnt2yf-crypto" target="_blank">GitHub</a>
      <a class="btn btn-secondary" href="mailto:togninomaurice@gmail.com">Kontakt</a>
    </div>
  </div>
  <div class="footer">Gebaut mit HTML & CSS · Gehostet auf GitHub Pages</div>
</body>
</html>
